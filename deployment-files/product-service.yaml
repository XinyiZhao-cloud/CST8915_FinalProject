apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: xyzhao0201/bestbuy-product-service:v4
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: MONGO_URL
              value: "mongodb://mongodb:27017/bestbuy"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  type: ClusterIP
  selector:
    app: product-service
  ports:
    - port: 3001
      targetPort: 3001